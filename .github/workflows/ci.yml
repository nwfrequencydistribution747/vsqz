name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e . pytest
      - name: Run tests
        run: python -m pytest tests/ -v --ignore=tests/benchmark_vram.py

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install ruff
        run: pip install ruff
      - name: Lint
        run: ruff check vsqz/ --ignore=F401,E501,E722,W291,W293 2>&1 || true

  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e .
      - name: Auto-review (always post comment)
        run: |
          set +e
          python .github/scripts/pr_review.py > review_output.txt 2>&1
          echo "EXIT=$?" >> $GITHUB_ENV
      - name: Post review as PR comment
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('review_output.txt', 'utf8');
            const blocked = review.includes('CANNOT BE MERGED');
            const emoji = blocked ? '🛑' : '✅';
            const body = '## ' + emoji + ' Automated PR Review\n\n```\n' + review + '\n```\n\n> ' + (blocked ? 'Fix all 🛑 blockers and push again.' : 'Ready for human review.')';
            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: body
            });
      - name: Block on review failures
        run: |
          if grep -q "CANNOT BE MERGED" review_output.txt 2>/dev/null; then
            echo "🛑 PR blocked by review bot — see comment above for details"
            exit 1
          fi
          echo "✅ Review passed"
